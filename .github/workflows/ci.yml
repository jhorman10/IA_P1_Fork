name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────
  # Job 1 — Lint, TypeScript check, production build
  # ──────────────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Producer ──
      - name: Setup Node (producer)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/producer/package-lock.json

      - name: Install producer deps
        working-directory: backend/producer
        run: npm ci

      - name: Typecheck producer
        working-directory: backend/producer
        run: npx tsc --noEmit

      - name: Lint producer
        working-directory: backend/producer
        run: npx eslint "{src,apps,libs,test}/**/*.ts" --max-warnings=0

      - name: Build producer
        working-directory: backend/producer
        run: npm run build

      # ── Consumer ──
      - name: Setup Node (consumer)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/consumer/package-lock.json

      - name: Install consumer deps
        working-directory: backend/consumer
        run: npm ci

      - name: Typecheck consumer
        working-directory: backend/consumer
        run: npx tsc --noEmit

      - name: Lint consumer
        working-directory: backend/consumer
        run: npx eslint "{src,apps,libs,test}/**/*.ts" --max-warnings=0

      - name: Build consumer
        working-directory: backend/consumer
        run: npm run build

      # ── Frontend ──
      - name: Setup Node (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint frontend
        working-directory: frontend
        run: npx eslint --max-warnings=0

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # ──────────────────────────────────────────────
  # Job 2 — Component / Unit tests (White-box)
  # ──────────────────────────────────────────────
  component-tests:
    name: Component Tests
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Producer unit tests ──
      - name: Setup Node (producer)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/producer/package-lock.json

      - name: Install producer deps
        working-directory: backend/producer
        run: npm ci

      - name: Typecheck producer
        working-directory: backend/producer
        run: npx tsc --noEmit

      - name: Producer unit tests + coverage
        working-directory: backend/producer
        run: npm run test:cov -- --forceExit

      - name: Upload producer coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-producer
          path: backend/producer/coverage/

      # ── Consumer unit tests ──
      - name: Setup Node (consumer)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/consumer/package-lock.json

      - name: Install consumer deps
        working-directory: backend/consumer
        run: npm ci

      - name: Typecheck consumer
        working-directory: backend/consumer
        run: npx tsc --noEmit

      - name: Consumer unit tests + coverage
        working-directory: backend/consumer
        run: npm run test:cov -- --forceExit

      - name: Upload consumer coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-consumer
          path: backend/consumer/coverage/

      # ── Frontend unit tests ──
      - name: Setup Node (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend unit tests + coverage
        working-directory: frontend
        run: npm run test:cov -- --forceExit
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/

  # ──────────────────────────────────────────────
  # Job 3 — Integration + E2E (Black-box)
  # Requires MongoDB + RabbitMQ service containers
  # ──────────────────────────────────────────────
  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: component-tests

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmqctl status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Producer integration tests ──
      - name: Setup Node (producer)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/producer/package-lock.json

      - name: Install producer deps
        working-directory: backend/producer
        run: npm ci

      - name: Producer integration tests
        working-directory: backend/producer
        run: npm test -- --testPathPatterns="integration" --forceExit
        env:
          MONGO_URI: mongodb://localhost:27017/appointments_db_test
          MONGODB_URI: mongodb://localhost:27017/appointments_db_test
          RABBITMQ_URL: amqp://localhost:5672
          NODE_ENV: test

      # ── Consumer integration tests ──
      - name: Setup Node (consumer)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/consumer/package-lock.json

      - name: Install consumer deps
        working-directory: backend/consumer
        run: npm ci

      - name: Consumer integration tests
        working-directory: backend/consumer
        run: npm test -- --testPathPatterns="integration" --forceExit
        env:
          MONGO_URI: mongodb://localhost:27017/appointments_db_test
          MONGODB_URI: mongodb://localhost:27017/appointments_db_test
          RABBITMQ_URL: amqp://localhost:5672
          NODE_ENV: test

      # ── E2E: auth-aware smoke for SPEC-004 ──
      - name: Producer auth-aware E2E tests
        working-directory: backend/producer
        run: npm run test:e2e
        env:
          NODE_ENV: test
          E2E_TEST_MODE: "true"
          MONGODB_URI: mongodb://localhost:27017/appointments_e2e_test
          RABBITMQ_URL: amqp://localhost:5672
          RABBITMQ_QUEUE: turnos_queue
          RABBITMQ_NOTIFICATIONS_QUEUE: turnos_notifications
          FRONTEND_URL: http://localhost:3001

  # ──────────────────────────────────────────────
  # Job 4 — Docker image build + Trivy security scan
  # ──────────────────────────────────────────────
  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build producer image
        run: docker build --target production -t producer:ci backend/producer

      - name: Build consumer image
        run: docker build --target production -t consumer:ci backend/consumer

      - name: Build frontend image
        run: docker build --target production -t frontend:ci frontend

      - name: Trivy scan — producer
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.51.2 image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            --format table \
            producer:ci

      - name: Trivy scan — consumer
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.51.2 image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            --format table \
            consumer:ci

      - name: Trivy scan — frontend
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.51.2 image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            --format table \
            frontend:ci

      - name: Trivy SARIF report — producer
        if: always()
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.51.2 image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-producer.sarif \
            producer:ci

      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-reports
          path: trivy-*.sarif

  # ──────────────────────────────────────────────
  # Job 5 — Deploy-ready gate (PR to main only)
  # ──────────────────────────────────────────────
  deploy-ready:
    name: Deploy Ready
    runs-on: ubuntu-latest
    needs: [component-tests, integration-tests, docker-security]
    if: github.event_name == 'pull_request'

    steps:
      - name: All gates passed
        run: echo "Pipeline verde — PR listo para merge a main"
