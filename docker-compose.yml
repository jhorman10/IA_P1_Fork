# ⚕️ HUMAN CHECK - Docker Compose Configuration
# Review exposed ports and environment variables before deployment
services:
  producer:
    container_name: backend-producer
    build:
      context: ./backend/producer
      dockerfile: Dockerfile
      target: development
    # ⚕️ HUMAN CHECK - Development Command
    # In production, remove this command to use the Dockerfile's CMD
    command: npm run start:dev
    # ⚕️ HUMAN CHECK - Exposed Ports
    # Verify that the mapped port doesn't conflict with other host services
    ports:
      - "${PRODUCER_PORT:-3000}:3000"
    # ⚕️ HUMAN CHECK - Development Volumes (Hot-Reload)
    # These volumes mount the local source code for development with hot-reload.
    # In production, remove these volumes and use the built image.
    volumes:
      - ./backend/producer:/app
      - /app/node_modules
      - /app/dist
    environment:
      - NODE_ENV=development
      - PORT=3000
      # ⚕️ HUMAN CHECK - RabbitMQ connection credentials
      # Do not use default credentials (guest/guest) in production.
      # Configure secure variables in .env
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE:-appointment_queue}
      # ⚕️ HUMAN CHECK - Notifications queue (WebSocket bridge)
      - RABBITMQ_NOTIFICATIONS_QUEUE=${RABBITMQ_NOTIFICATIONS_QUEUE:-appointment_notifications}
      # ⚕️ HUMAN CHECK - MongoDB connection credentials (Read)
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/appointments_db?authSource=admin
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  consumer:
    container_name: backend-consumer
    build:
      context: ./backend/consumer
      dockerfile: Dockerfile
      target: development
    # ⚕️ HUMAN CHECK - Development Command
    # In production, remove this command to use the Dockerfile's CMD
    command: npm run start:dev
    # ⚕️ HUMAN CHECK - Development Volumes (Hot-Reload)
    # These volumes mount the local source code for development with hot-reload.
    # In production, remove these volumes and use the built image.
    volumes:
      - ./backend/consumer:/app
      - /app/node_modules
      - /app/dist
    environment:
      - NODE_ENV=development
      # ⚕️ HUMAN CHECK - RabbitMQ connection credentials
      # Do not use default credentials (guest/guest) in production.
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE:-appointment_queue}
      # ⚕️ HUMAN CHECK - Notifications queue (WebSocket bridge)
      - RABBITMQ_NOTIFICATIONS_QUEUE=${RABBITMQ_NOTIFICATIONS_QUEUE:-appointment_notifications}
      # ⚕️ HUMAN CHECK - Scheduler configuration
      - SCHEDULER_INTERVAL_MS=1000
      - CONSULTORIOS_TOTAL=5
      # ⚕️ HUMAN CHECK - MongoDB connection credentials
      # Do not use default credentials in production.
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/appointments_db?authSource=admin
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      producer:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  frontend:
    container_name: frontend-app
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # ⚕️ HUMAN CHECK - Comando de desarrollo
    # En producción, eliminar este command para usar el CMD del Dockerfile
    command: npm run dev -- -p 3001 -H 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # ⚕️ HUMAN CHECK - NEXT_PUBLIC_* se ejecutan en el NAVEGADOR del usuario, no en Docker
      # Por eso usan localhost (no el hostname interno 'producer')
      # Para probar en red local, cambia 'localhost' por tu IP local (ej. http://192.168.1.50:3000)
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3000
      # ⚕️ HUMAN CHECK - URL del WebSocket
      - NEXT_PUBLIC_WS_URL=http://localhost:3000
    depends_on:
      - producer
    networks:
      - app-network

  # ⚕️ HUMAN CHECK - RabbitMQ Configuration
  # Change default credentials before going to production
  rabbitmq:
    container_name: P1_rabbitmq
    image: rabbitmq:3-management-alpine
    # ⚕️ HUMAN CHECK - RabbitMQ Exposed Ports
    # Port 15672 (Management UI) SHOULD NOT be exposed in production
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MGMT_PORT}:15672"
    # ⚕️ HUMAN CHECK - RabbitMQ Default Credentials
    # guest/guest credentials should only be used in local development.
    # Use secrets or secure environment variables in production.
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ⚕️ HUMAN CHECK - MongoDB Configuration
  # Change default credentials before going to production
  mongodb:
    container_name: P1_mongodb
    image: mongo:7
    ports:
      - "${MONGODB_PORT}:27017"
    # ⚕️ HUMAN CHECK - MongoDB Default Credentials
    # admin/admin123 credentials should only be used in local development.
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
      - MONGO_INITDB_DATABASE=appointments_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
    driver: local

networks:
  app-network:
    driver: bridge
